{% extends "scraper/base.html" %}
{% block title %}Create New Partnership{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-xl font-semibold mb-4">Create New Partnership</h2>
    <form id="partnershipForm" method="POST" action="{% url 'create_partnership_api' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Save</button>
    </form>
    <div id="message" class="mt-4"></div>
</div>

<script>
document.getElementById("partnershipForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const form = e.target;
    const data = new FormData(form);
    const response = await fetch(form.action, { method: "POST", body: data });
    const result = await response.json();
    const messageDiv = document.getElementById("message");
    if(result.status === "success"){
        messageDiv.innerHTML = "<span class='text-green-600'>Partnership created successfully!</span>";
        form.reset();
    } else {
        messageDiv.innerHTML = "<span class='text-red-600'>Error: " + JSON.stringify(result.errors) + "</span>";
    }
});
</script>
{% endblock %}
